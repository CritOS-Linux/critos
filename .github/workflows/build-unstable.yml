name: Build CritOS Linux Image UNSTABLE

on:
  schedule:
    - cron: "00 06 * * *"  # codziennie o 06:00 UTC
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom UNSTABLE Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml

    steps:
      - name: Build CritOS UNSTABLE Image
        uses: blue-build/github-action@v1.8
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

      - name: Create UNSTABLE GitHub Release (prerelease)
        if: github.event_name != 'pull_request'
        run: |
          DATE=$(date +'%Y-%m-%d')
          TAG="unstable-$DATE"
          gh release create "$TAG" --title "CritOS Unstable – $DATE" --prerelease --notes "Automated UNSTABLE build for $DATE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
